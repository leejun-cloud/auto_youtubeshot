name: Windows Smoke Test

# 실제 windows-latest 러너에서 "번들 Node + npm install" 이 동작하는지 검증.
# (Mac에서 났던 npm 유실 버그와 동일한 실패 지점을 진짜 윈도우로 확인)
on:
  workflow_dispatch: {}

jobs:
  smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build dist-win (포터블 Node 번들 포함)
        # 마지막 zip 단계(포터블 배포용, 설치파일과 무관)는 윈도우에 zip이 없어 실패할 수
        # 있으나 dist-win 조립은 그 전에 끝난다. 조립 성공 여부는 다음 스텝에서 검증.
        continue-on-error: true
        run: npm run build:win

      - name: 번들 npm 존재 확인
        shell: pwsh
        run: |
          Get-ChildItem dist-win\runtime | Select-Object Name
          if (!(Test-Path "dist-win\runtime\node_modules\npm\bin\npm-cli.js")) {
            throw "번들 npm 유실 (npm-cli.js 없음)"
          }
          Write-Host "OK: 번들 npm 존재"

      - name: 실제 실행 경로(start.bat = node + launcher.cjs) 로 npm install 검증
        shell: pwsh
        run: |
          # 설치본과 동일한 방식: 번들 node 로 launcher.cjs 직접 실행 (pkg start.exe 미사용)
          $node = "dist-win\runtime\node.exe"
          $out = "start-out.txt"
          $p = Start-Process -FilePath $node -ArgumentList "scripts\launcher.cjs" `
                 -WorkingDirectory "dist-win" -PassThru `
                 -RedirectStandardOutput $out -RedirectStandardError "start-err.txt"
          $ok = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 5
            if ((Test-Path $out) -and (Select-String -Path $out -Pattern 'Dependencies ready|Starting server' -Quiet)) { $ok = $true; break }
            if ((Test-Path $out) -and (Select-String -Path $out -Pattern 'npm install failed|is not recognized|배치 파일이 아닙니다' -Quiet)) { break }
          }
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue
          Write-Host "----- start.exe 출력(마지막 40줄) -----"
          if (Test-Path $out) { Get-Content $out -Tail 40 }
          if (-not $ok) { throw "launcher 가 npm install 를 통과하지 못했습니다" }
          Write-Host "OK: start.exe → npm install 통과 (launcher 정상)"

      - name: Next.js 설치 확인
        shell: pwsh
        run: |
          if (!(Test-Path "dist-win\node_modules\next\dist\bin\next")) {
            throw "next 미설치 — npm install 실패"
          }
          Write-Host "OK: next 설치됨 → Windows 번들 npm 정상 동작"
